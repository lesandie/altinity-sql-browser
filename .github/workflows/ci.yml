name: ci

on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Test (vitest + coverage gate)
        run: npm test
      - name: Build single-file SPA
        run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: sql-browser-dist
          path: dist/sql.html
          retention-days: 14
